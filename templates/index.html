<!DOCTYPE html>
<html lang="en">
{% import "_rich_notes_editor.html" as rich_notes %}

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes Recorder</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <link rel="stylesheet" href="{{ url_for('static', filename='bootstrap-css/bootstrap.min.css') }}">

</head>

<body data-has-active-transcription="{{ has_active_transcription | tojson }}"
    data-save-recording-url="{{ url_for('save_recording') }}">
    <div class="container mt-5">
        <h1 class="text-center mb-4">Notes Recorder</h1>
        <div class="text-center mb-4">
            <form id="upload-form" action="{{ url_for('upload') }}" method="post" enctype="multipart/form-data">
                <label for="file" class="form-label">Upload an audio file: &nbsp;
                    <input type="file" name="file" accept=".wav,.mp3,.ogg,.webm,.m4a,.mp4" required>
                </label>
                <button type="submit" class="btn btn-success">Upload</button>
            </form>

            <form id="start-recording-form" class="mt-3">
                <div id="subject-radio-group"></div><br>
                <button type="submit" id="start-button" class="btn btn-primary">Start Recording</button>
            </form>

            <form id="stop-recording-form" class="mt-3">
                <button type="submit" id="stop-button" class="btn btn-danger" disabled>
                    Stop Recording
                </button>
                <button type="button" id="cancel-button" class="btn btn-outline-secondary" disabled>
                    Cancel
                </button>
            </form>
            <div id="recording-status" class="mt-3"></div>
            <div id="active-notes-panel" class="rich-notes-panel text-start mt-3 d-none">
                <div class="d-flex justify-content-between align-items-center gap-2 mb-2">
                    <div class="fw-semibold">Recording notes</div>
                    <div id="active-notes-save-status" class="small text-muted"></div>
                </div>
                {{ rich_notes.editor("active-recording-notes-editor") }}
            </div>
        </div>

        <div class="text-end mb-2">
            <a href="{{ url_for('chat') }}" class="btn btn-outline-primary btn-sm">
                Chat with Recordings
            </a>
            <button type="button" class="btn btn-outline-primary btn-sm" id="manage-subjects-btn" data-bs-toggle="modal"
                data-bs-target="#manage-subjects-modal">
                Manage Subjects
            </button>
            <button type="button" class="btn btn-outline-primary btn-sm" id="manage-tags-btn" data-bs-toggle="modal"
                data-bs-target="#manage-tags-modal">
                Manage Tags
            </button>
        </div>

        <div id="filters-bar" class="row g-2 mb-3 align-items-end">
            <div class="col-12 col-md-4">
                <label for="search-input" class="form-label small mb-1">Search</label>
                <input type="search" id="search-input" class="form-control"
                    placeholder="Search title, notes, transcript, subject, key points...">
            </div>
            <div class="col-6 col-md-2">
                <label for="date-from-input" class="form-label small mb-1">Date from</label>
                <input type="date" id="date-from-input" class="form-control">
            </div>
            <div class="col-6 col-md-2">
                <label for="date-to-input" class="form-label small mb-1">Date to</label>
                <input type="date" id="date-to-input" class="form-control">
            </div>
            <div class="col-6 col-md-1">
                <label for="time-from-input" class="form-label small mb-1">Time from</label>
                <input type="time" id="time-from-input" class="form-control">
            </div>
            <div class="col-6 col-md-1">
                <label for="time-to-input" class="form-label small mb-1">Time to</label>
                <input type="time" id="time-to-input" class="form-control">
            </div>
            <div class="col-6 col-md-2 dropdown">
                <label class="form-label small mb-1 d-block">Tags</label>
                <button class="btn btn-outline-secondary btn-sm dropdown-toggle w-100" type="button" id="tag-filter-btn"
                    data-bs-toggle="dropdown" data-bs-auto-close="outside" aria-expanded="false">
                    Tags <span id="tag-filter-count" class="badge bg-secondary d-none">0</span>
                </button>
                <div class="dropdown-menu p-2 tag-filter-menu" id="filter-tag-tree"></div>
            </div>
            <div class="col-6 col-md-2 dropdown">
                <label class="form-label small mb-1 d-block">Subject</label>
                <button class="btn btn-outline-secondary btn-sm dropdown-toggle w-100" type="button"
                    id="subject-filter-btn" data-bs-toggle="dropdown" data-bs-auto-close="outside"
                    aria-expanded="false">
                    Subject <span id="subject-filter-count" class="badge bg-secondary d-none">0</span>
                </button>
                <div class="dropdown-menu p-2 tag-filter-menu" id="filter-subject-list"></div>
            </div>
            <div class="col-12 col-md-1">
                <button id="clear-filters-btn" type="button" class="btn btn-outline-secondary btn-sm w-100">
                    Clear
                </button>
            </div>
        </div>

        <div class="form-check mb-2">
            <input class="form-check-input" type="checkbox" id="sync-toggle" checked>
            <label class="form-check-label small" for="sync-toggle">Sync transcript with audio playback</label>
        </div>

        <div id="recordings-list" class="mt-4">
            {% include "_notes_list.html" %}
        </div>
    </div><br>

    <div class="modal fade" id="manage-subjects-modal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Manage Subjects</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <ul class="list-group mb-3" id="subject-list-manage"></ul>
                    <div class="small text-muted mb-1">Add subject</div>
                    <div class="d-flex gap-2 align-items-end">
                        <input type="text" id="new-subject-name" class="form-control form-control-sm">
                        <button type="button" id="add-subject-btn"
                            class="btn btn-sm btn-primary text-nowrap">Add</button>
                    </div>
                    <div class="small text-danger mt-2 d-none" id="subject-manage-error"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="manage-tags-modal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Manage Tags</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div id="tag-tree-manage"></div>
                    <hr>
                    <div class="small text-muted mb-1">Add tag</div>
                    <div class="d-flex gap-2 align-items-end flex-wrap">
                        <div>
                            <label class="form-label small mb-1" for="new-tag-name">Name</label>
                            <input type="text" id="new-tag-name" class="form-control form-control-sm">
                        </div>
                        <div>
                            <label class="form-label small mb-1" for="new-tag-color">Color</label>
                            <input type="color" id="new-tag-color"
                                class="form-control form-control-color form-control-sm" value="#3366cc">
                        </div>
                        <div>
                            <label class="form-label small mb-1" for="new-tag-parent">Parent</label>
                            <select id="new-tag-parent" class="form-select form-select-sm">
                                <option value="">(top-level)</option>
                            </select>
                        </div>
                        <button type="button" id="add-tag-btn" class="btn btn-sm btn-primary">Add</button>
                    </div>
                    <div class="small text-danger mt-2 d-none" id="tag-manage-error"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="note-tags-modal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Edit tags</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div id="note-tag-tree"></div>
                </div>
                <div class="modal-footer">
                    <div class="small text-danger me-auto d-none" id="note-tags-error"></div>
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="save-note-tags-btn">Save</button>
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='bootstrap-js/bootstrap.bundle.min.js') }}"></script>
    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>

</html>
