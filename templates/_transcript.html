{% import "_transcript_macros.html" as transcript %}
{% set words = note.transcription_segments | from_json %}
{% if note.transcription and note.transcription | length > 500 %}
<div class="collapse" id="transcript-{{ note.id }}">
    {{ transcript.render_words(note, words) }}
</div>
<button class="btn btn-link btn-sm ps-0 mt-1" type="button" data-bs-toggle="collapse"
    data-bs-target="#transcript-{{ note.id }}" aria-expanded="false" aria-controls="transcript-{{ note.id }}">
    Show full transcript
</button>
{% else %}
{{ transcript.render_words(note, words) }}
{% endif %}
